<!DOCTYPE html>
<html>
<head>
    <title>Daily Cause List</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #f4f6f9;
        }

        header {
            background-color: #1a237e;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        input, select, button {
            padding: 8px;
            margin: 5px 0;
            font-size: 14px;
            width: 100%;
        }

        button {
            background-color: #1a237e;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background-color: #1a237e;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .status-pending {
            background: #e53935;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
        }

        .status-done {
            background: #43a047;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<header>Daily Cause List</header>

<div class="container">

    <h3>Add Case</h3>

    <!-- Case Type (Auto Suggest) -->
    <input list="caseTypes" id="caseType" placeholder="Start typing case type...">
    <datalist id="caseTypes">
        <option value="Summary Suit">
        <option value="Special Civil Suit">
        <option value="Regular Civil Suit">
        <option value="Commercial Suit">
        <option value="RERA Complaint">
        <option value="Execution Petition">
        <option value="Writ Petition">
        <option value="Appeal">
        <option value="Revision Application">
        <option value="Consumer Complaint">
    </datalist>

    <input type="text" id="caseNumber" placeholder="Case Number (e.g., 123/2024)">
    
    <select id="courtType">
        <option>District Court</option>
        <option>RERA</option>
        <option>High Court</option>
        <option>Collector Office</option>
    </select>

    <button onclick="addCase()">Add to Cause List</button>

    <table>
        <thead>
            <tr>
                <th>Case</th>
                <th>Court</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="caseTable"></tbody>
    </table>

</div>

<script>

    let cases = JSON.parse(localStorage.getItem("cases")) || [];

    function saveCases() {
        localStorage.setItem("cases", JSON.stringify(cases));
    }

    function renderCases() {
        const table = document.getElementById("caseTable");
        table.innerHTML = "";

        cases.forEach((c, index) => {
            const row = `
                <tr>
                    <td>${c.title}</td>
                    <td>${c.court}</td>
                    <td>
                        <span class="${c.done ? 'status-done' : 'status-pending'}">
                            ${c.done ? 'Done' : 'Pending'}
                        </span>
                    </td>
                    <td>
                        <button onclick="toggleStatus(${index})">Toggle</button>
                        <button onclick="deleteCase(${index})">Delete</button>
                    </td>
                </tr>
            `;
            table.innerHTML += row;
        });
    }

    function addCase() {
        const type = document.getElementById("caseType").value;
        const number = document.getElementById("caseNumber").value;
        const court = document.getElementById("courtType").value;

        if (!type || !number) return;

        const formattedTitle = type + " No. " + number;

        cases.push({
            title: formattedTitle,
            court: court,
            done: false
        });

        saveCases();
        renderCases();

        document.getElementById("caseType").value = "";
        document.getElementById("caseNumber").value = "";
    }

    function toggleStatus(index) {
        cases[index].done = !cases[index].done;
        saveCases();
        renderCases();
    }

    function deleteCase(index) {
        cases.splice(index, 1);
        saveCases();
        renderCases();
    }

    renderCases();

</script>

</body>
</html>
